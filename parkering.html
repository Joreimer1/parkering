<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<title>ParkIQ</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
h1{font-size:28px;font-weight:700;margin-bottom:28px;text-align:center}
.card{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px}
.lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#8e8e93;margin-bottom:6px}
.val{font-size:20px;font-weight:600}
.sub{font-size:14px;color:#636366;margin-top:4px}
.taxa{font-size:14px;color:#1c1c1e;margin-top:8px;line-height:1.5;padding:10px;background:#f2f2f7;border-radius:8px}
.taxa-type{font-weight:600;margin-bottom:4px}
.srow{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:12px 0;border-bottom:1px solid #f2f2f7}
.srow:last-child{border-bottom:none}
.sday{font-weight:600;font-size:16px}
.stim{font-size:14px;color:#636366}
.badge{font-size:12px;border-radius:8px;padding:3px 8px;font-weight:600;background:#fff3cd;color:#856404}
.urg{background:#f8d7da;color:#842029}
.nearest{background:#e8f4fd;color:#0066cc}
.btn{display:block;width:100%;max-width:420px;padding:16px;border-radius:14px;border:none;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:opacity .15s}
.btn:active{opacity:.75}
.bp{background:#007aff;color:#fff}
.bs{background:#e5e5ea;color:#1c1c1e}
.bg{background:#34c759;color:#fff}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #e5e5ea;border-top-color:#007aff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.status{text-align:center;font-size:15px;color:#636366;margin:8px 0 20px;max-width:420px;line-height:1.5}
.sec{display:none;width:100%;max-width:420px}
.rowbtn{display:block;width:100%;padding:10px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;background:#007aff;color:#fff;margin-top:4px}
.rowbtn.done{background:#e5e5ea;color:#1c1c1e}
</style>
</head>
<body>
<h1>ParkIQ</h1>
<div class="status" id="STATUS"><span class="spin"></span> Startar...</div>

<div class="sec" id="SEC1">
  <div class="card">
    <div class="lbl">Du ar parkerad pa</div>
    <div class="val" id="SEC1street"></div>
    <div class="sub" id="SEC1addr"></div>
  </div>
  <button class="btn bg" onclick="onConfirm()">Ja, det stammer</button>
  <button class="btn bs" onclick="showMap()">Fel gata – peka pa kartan</button>
  <div id="mapcard" style="display:none;width:100%;max-width:420px;margin-bottom:12px">
    <div style="background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07)">
      <div id="map" style="height:320px"></div>
      <div style="padding:12px;font-size:13px;color:#636366;text-align:center">Tryck på rätt gata på kartan</div>
    </div>
  </div>
</div>

<div class="sec" id="SEC2">
  <div class="card">
    <div class="lbl">Parkerad pa</div>
    <div class="val" id="SEC2street"></div>
  </div>
  <div class="card" id="SEC2taxacard" style="display:none">
    <div class="lbl">Parkeringsregler</div>
    <div id="SEC2taxa"></div>
  </div>
  <div id="SEC2sms"></div>
  <div class="card">
    <div class="lbl">Servicenatter - valj din sida</div>
    <div id="SEC2list"></div>
  </div>
  <button class="btn bs" style="margin-top:4px" onclick="onRetry()">Ny parkering</button>
</div>

<div class="sec" id="SEC3">
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:12px">!</div>
    <strong id="SEC3t"></strong>
    <p id="SEC3m" style="font-size:15px;color:#636366;margin-top:8px;line-height:1.5"></p>
    <button class="btn bp" style="margin-top:16px" onclick="onRetry()">Forsok igen</button>
  </div>
</div>

<script>
var AK="bdbc0530-408c-4ac0-8ad4-bcda19d40d6e";
var WU="https://gentle-unit-77d4.johan-oestberg.workers.dev";
var BA="https://openparking.stockholm.se/LTF-Tolken/v1";
var lat,lon,gata;

function setSt(h){var e=document.getElementById("STATUS");e.innerHTML=h;e.style.display=h?"block":"none";}
function showSec(id){["SEC1","SEC2","SEC3"].forEach(function(s){document.getElementById(s).style.display="none";});if(id)document.getElementById(id).style.display="block";}
function showErr(t,m){setSt("");document.getElementById("SEC3t").textContent=t;document.getElementById("SEC3m").textContent=m;showSec("SEC3");}
function onRetry(){showSec(null);start();}

var DM={mandag:1,tisdag:2,onsdag:3,torsdag:4,fredag:5,lordag:6,sondag:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,sunday:0};
function dnum(s){if(!s)return null;var k=s.toLowerCase().trim().replace(/[\u00e5\u00e4]/g,"a").replace(/\u00f6/g,"o");return DM.hasOwnProperty(k)?DM[k]:null;}
function nxtDate(n){var now=new Date(),diff=((n-now.getDay()+7)%7)||7,d=new Date(now);d.setDate(d.getDate()+diff);return d;}
function ptime(s){
  if(s===null||s===undefined||s==="")return null;
  var n=+s;if(!isNaN(n)){return{h:Math.floor(n/100),m:n%100};}
  var m=String(s).match(/(\d{1,2})[:.h](\d{2})/);return m?{h:+m[1],m:+m[2]}:null;
}
function fmtTime(s){if(s===null||s===undefined||s==="")return"";var t=ptime(s);if(!t)return"";return String(t.h).padStart(2,"0")+":"+String(t.m).padStart(2,"0");}
function itsmp(d){function z(n){return String(n).padStart(2,"0");}return d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+"T"+z(d.getHours())+z(d.getMinutes())+"00";}
function mkICS(sum,ds,de,desc){
  var c=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Pk//SV","BEGIN:VEVENT","UID:p"+Date.now()+"@pk","DTSTAMP:"+itsmp(new Date()),"DTSTART:"+ds,"DTEND:"+de,"SUMMARY:"+sum,"DESCRIPTION:"+desc,"BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:"+sum,"END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n");
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([c],{type:"text/calendar"}));a.download="parkering.ics";document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// Haversine-avstånd i meter
function haversine(lat1,lon1,lat2,lon2){
  var R=6371000,rad=function(v){return v*Math.PI/180;};
  var dLat=rad(lat2-lat1),dLon=rad(lon2-lon1);
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Minsta avstånd från koordinat till en features geometri
function distToFeature(f,clat,clon){
  var geom=f.geometry||f.Geometry||(f.properties&&f.properties.geometry);
  if(!geom||!geom.coordinates)return Infinity;
  var lines=geom.type==="LineString"?[geom.coordinates]:geom.type==="MultiLineString"?geom.coordinates:[];
  var best=Infinity;
  for(var i=0;i<lines.length;i++)
    for(var j=0;j<lines[i].length;j++){
      var d=haversine(clat,clon,lines[i][j][1],lines[i][j][0]);
      if(d<best)best=d;
    }
  return best;
}

function start(){
  setSt('<span class="spin"></span> Hamtar din position...');
  if(!navigator.geolocation){showErr("GPS saknas","Webbläsaren stoeder inte platstjanster.");return;}
  navigator.geolocation.getCurrentPosition(
    function(p){lat=p.coords.latitude;lon=p.coords.longitude;geocode();},
    function(e){var m={1:["Nekad","Ge Safari tillgang till plats."],2:["Hittades ej","GPS saknas."],3:["Timeout","Forsok igen."]};var r=m[e.code]||["Fel","Kod "+e.code];showErr(r[0],r[1]);},
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function geocode(){
  setSt('<span class="spin"></span> Identifierar gatan...');
  fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+lat+"&lon="+lon+"&addressdetails=1",{headers:{"Accept":"application/json","User-Agent":"parkeringsapp/1.0"}})
  .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(j){
    var a=j.address||{};var s=a.road||a.pedestrian||a.residential||a.street||a.quarter;
    if(!s){showErr("Okand gata","Ingen gatuadress hittades.");return;}
    gata=s;
    var full=a.house_number?s+" "+a.house_number:s;var sub=a.suburb||a.city_district||"";
    document.getElementById("SEC1street").textContent=s;
    document.getElementById("SEC1addr").textContent=sub?full+", "+sub:full;
    setSt("");showSec("SEC1");
  })
  .catch(function(e){showErr("Adressfel",e.message);});
}

function onConfirm(){
  showSec(null);setSt('<span class="spin"></span> Hamtar parkeringsinfo...');
  var tgt=BA+"/servicedagar/street/"+encodeURIComponent(gata)+"?outputFormat=json&apiKey="+AK;
  var url=WU.replace(/\/+$/,"")+"/?target="+encodeURIComponent(tgt);
  fetch(url,{headers:{"Accept":"application/json"}})
  .then(function(r){return r.text().then(function(t){if(!r.ok)throw new Error("API "+r.status);return JSON.parse(t);});})
  .then(function(data){
    var f=(data&&data.type==="FeatureCollection")?data.features:Array.isArray(data)?data:Array.isArray(data.features)?data.features:[];
    document.getElementById("SEC2street").textContent=gata;
    setSt("");showSec("SEC2");
    renderTaxa(f);
    render(f,lat,lon);
  })
  .catch(function(e){showErr("Fel vid hamtning",e.message);});
}

function renderTaxa(features){
  document.getElementById("SEC2sms").innerHTML="";
  document.getElementById("SEC2taxa").innerHTML="";
  document.getElementById("SEC2taxacard").style.display="none";
  if(!features.length)return;
  var p=null;
  for(var i=0;i<features.length;i++){var fp=features[i].properties||features[i];if(fp.PARKING_RATE||fp.VF_PLATS_TYP){p=fp;break;}}
  if(!p)return;
  var html="";
  var typ=p.VF_PLATS_TYP||"";if(typ)html+='<div class="taxa-type">'+typ+'</div>';
  var rate=p.PARKING_RATE||"";if(rate)html+='<div class="taxa">'+rate+'</div>';
  var dist=p.PARKING_DISTRICT||p.CITY_DISTRICT||"";if(dist)html+='<div style="font-size:13px;color:#8e8e93;margin-top:6px">Distrikt: '+dist+'</div>';
  if(html){document.getElementById("SEC2taxa").innerHTML=html;document.getElementById("SEC2taxacard").style.display="block";}
  var taxaNum=null;
  var taxaMatch=rate.match(/taxa\s*(\d+)/i);
  if(taxaMatch)taxaNum=taxaMatch[1];
  if(taxaNum){
    var smsEl=document.getElementById("SEC2sms");
    var btn=document.createElement("button");
    btn.className="btn";
    btn.style.cssText="background:#34c759;color:#fff;margin-bottom:12px";
    btn.textContent="Köp biljett i Parkster – zon "+taxaNum;
    btn.onclick=function(){window.location="parkster://start?zone="+taxaNum;};
    smsEl.appendChild(btn);
  }
}

function render(features,clat,clon){
  var le=document.getElementById("SEC2list");le.innerHTML="";
  var days=[];
  features.forEach(function(f){
    var p=f.properties||f;
    var ds=p.START_WEEKDAY||p.WEEKDAY||p.Weekday||p.weekday||p.STARTDAY||"";
    var st=p.START_TIME!==undefined?p.START_TIME:p.StartTime!==undefined?p.StartTime:p.start_time!==undefined?p.start_time:"";
    var en=p.END_TIME!==undefined?p.END_TIME:p.EndTime!==undefined?p.EndTime:p.end_time!==undefined?p.end_time:"";
    if(!ds)return;
    var d=distToFeature(f,clat,clon);
    days.push({ds:ds,st:st,en:en,dist:d});
  });

  // Sortera närmast först
  days.sort(function(a,b){return a.dist-b.dist;});

  // Ta bort duplikater efter sortering (behåll närmaste instans)
  var deduped=[],seenKeys={};
  days.forEach(function(d){
    var k=d.ds+"|"+d.st+"|"+d.en;
    if(!seenKeys[k]){seenKeys[k]=true;deduped.push(d);}
  });
  days=deduped;

  if(!days.length){le.innerHTML='<p style="color:#636366;font-size:15px;padding:6px 0">Inga servicedagar registrerade.</p>';return;}

  days.forEach(function(day,idx){
    var dn=dnum(day.ds),nd=dn!==null?nxtDate(dn):null;
    var dl=nd?Math.round((nd-new Date())/86400000):null;
    var stFmt=fmtTime(day.st),enFmt=fmtTime(day.en),t=ptime(day.st);

    // Badge: "Sannolikt närmast" för första raden om det finns flera
    var badge="";
    if(idx===0&&days.length>1){
      badge='<span class="badge nearest">Sannolikt närmast dig</span>';
    }
    if(dl!==null){
      var bc=dl<=1?"badge urg":"badge";
      var bl=dl===0?"Ikvall!":dl===1?"Imorgon":"Om "+dl+" dagar";
      badge+='<span class="'+bc+'">'+bl+"</span>";
    }

    var row=document.createElement("div");row.className="srow";
    row.innerHTML='<div style="display:flex;justify-content:space-between;width:100%;align-items:center"><div><div class="sday">'+day.ds+'</div><div class="stim">'+stFmt+(stFmt&&enFmt?"–":"")+enFmt+"</div></div>"+badge+"</div>";

    if(nd&&day.st!==undefined&&day.st!==""&&t){
      var es=new Date(nd);es.setHours(t.h,t.m,0,0);
      var ee=new Date(es);var te=ptime(day.en);
      if(te)ee.setHours(te.h,te.m,0,0);else ee.setHours(t.h+1,t.m,0,0);
      var when=dl===0?"ikvall":dl===1?"imorgon":day.ds.toLowerCase();
      var btn=document.createElement("button");btn.className="rowbtn";btn.textContent="Paminnelse "+when+" kl "+stFmt;
      var _s="Flytta bilen - "+gata,_ds=itsmp(es),_de=itsmp(ee),_d="Servicenatt pa "+gata+". Flytta bilen innan kl "+stFmt+".";
      btn.onclick=function(){mkICS(_s,_ds,_de,_d);btn.textContent="Oppna .ics-filen for att spara i Kalender";btn.className="rowbtn done";};
      row.appendChild(btn);
    }
    le.appendChild(row);
  });
}

var map=null;

function showMap(){
  document.getElementById("mapcard").style.display="block";
  if(!map){
    var script=document.createElement("script");
    script.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    script.onload=function(){
      map=L.map("map").setView([lat,lon],17);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
      L.circleMarker([lat,lon],{radius:8,color:"#007aff",fillColor:"#007aff",fillOpacity:0.8}).addTo(map);
      map.on("click",function(e){onMapClick(e.latlng.lat,e.latlng.lng);});
    };
    document.body.appendChild(script);
  } else {
    setTimeout(function(){map.invalidateSize();},100);
  }
}

function onMapClick(clat,clon){
  document.getElementById("mapcard").style.display="none";
  setSt('<span class="spin"></span> Identifierar gatan...');
  fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+clat+"&lon="+clon+"&addressdetails=1",
    {headers:{"Accept":"application/json","User-Agent":"parkeringsapp/1.0"}})
  .then(function(r){return r.json();})
  .then(function(j){
    var a=j.address||{};
    var s=a.road||a.pedestrian||a.residential||a.street||a.quarter;
    if(!s){showMap();return;}
    gata=s;lat=clat;lon=clon;
    var full=a.house_number?s+" "+a.house_number:s;
    var sub=a.suburb||a.city_district||"";
    document.getElementById("SEC1street").textContent=s;
    document.getElementById("SEC1addr").textContent=sub?full+", "+sub:full;
    setSt("");showSec("SEC1");
  })
  .catch(function(){showMap();});
}

start();
</script>
<p style="text-align:center;font-size:11px;color:#c7c7cc;margin-top:32px">v1.4</p>
</body>
</html>
